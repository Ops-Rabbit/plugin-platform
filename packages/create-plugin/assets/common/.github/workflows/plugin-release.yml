name: Plugin Release

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing plugin release tag (vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: plugin-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref != 'refs/heads/main' || !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Plan automatic main release
        id: main_plan
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/plan-plugin-release.mjs "${{ github.event.before }}" "${GITHUB_SHA}"
      - name: Plan existing tagged release
        id: tag_plan
        if: github.event_name != 'push' || startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: node scripts/plan-plugin-release.mjs --tag "${RELEASE_TAG}"
      - name: Commit automatic patch version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.main_plan.outputs.has_release == 'true'
        run: |
          if ! git diff --quiet -- opsrabbit.plugin.json package.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add opsrabbit.plugin.json package.json
            git commit -m "chore(release): prepare automatic plugin version [skip release]"
            git push origin HEAD:main
          fi
      - name: Record release plan
        id: plan
        env:
          HAS_RELEASE: ${{ steps.main_plan.outputs.has_release || steps.tag_plan.outputs.has_release }}
          RELEASE_TAG: ${{ steps.main_plan.outputs.tag || steps.tag_plan.outputs.tag }}
        run: |
          echo "has_release=${HAS_RELEASE}" >> "${GITHUB_OUTPUT}"
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
      - name: Install dependencies
        if: steps.plan.outputs.has_release == 'true'
        run: npm ci
      - name: Run release quality gates
        if: steps.plan.outputs.has_release == 'true'
        run: npm run check && npm run test:coverage && npm run build && npm run plugin:check
      - name: Create immutable plugin tag
        if: steps.plan.outputs.has_release == 'true'
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
          RELEASE_SHA: ${{ steps.plan.outputs.sha }}
        run: |
          if git rev-parse --verify "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            test "$(git rev-list -n 1 "${RELEASE_TAG}")" = "${RELEASE_SHA}"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "${RELEASE_TAG}" "${RELEASE_SHA}" -m "Plugin ${RELEASE_TAG}"
            git push origin "${RELEASE_TAG}"
          fi
      - name: Prepare release assets
        if: steps.plan.outputs.has_release == 'true'
        env:
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
        run: npx opsrabbit-plugin release --tag "${RELEASE_TAG}"
      - name: Attest plugin bundle provenance
        if: steps.plan.outputs.has_release == 'true'
        id: provenance
        continue-on-error: true
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release-assets/*.zip
      - name: Publish GitHub Release assets
        if: steps.plan.outputs.has_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.plan.outputs.tag }}
          PROVENANCE_OUTCOME: ${{ steps.provenance.outcome }}
        run: |
          notes="Upload the explicitly named plugin ZIP asset to OpsRabbit; do not upload GitHub's auto-generated Source code archives."
          if [[ "${PROVENANCE_OUTCOME}" == "success" ]]; then
            notes="${notes} GitHub build provenance is attached."
          else
            notes="${notes} GitHub provenance attestation was unavailable; verify the SHA-256 checksum and SPDX SBOM."
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" --title "Plugin ${RELEASE_TAG}" --notes "${notes}"
            gh release upload "${RELEASE_TAG}" release-assets/* --clobber
          else
            gh release create "${RELEASE_TAG}" release-assets/* --verify-tag --title "Plugin ${RELEASE_TAG}" --notes "${notes}"
          fi
