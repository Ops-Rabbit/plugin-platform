name: Plugin Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Require the tagged commit to be on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main
      - run: npm ci
      - run: npm run check
      - run: npm run test:coverage
      - run: npm run build
      - run: npm run plugin:check
      - run: npx opsrabbit-plugin release --tag "$GITHUB_REF_NAME"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: release-assets/*.zip
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-assets/* --verify-tag --generate-notes
